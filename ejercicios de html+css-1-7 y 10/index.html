<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Perfil</title>
    <!-- Vinculamos el CSS (o puedes ponerlo en una etiqueta <style>) -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Contenedor Principal de la Tarjeta -->
    <div class="tarjeta-perfil">
        <!-- Imagen de Perfil -->
        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=880&q=80" alt="Foto de perfil" class="perfil-imagen">
        
        <!-- Nombre -->
        <h3>Junior Pino</h3>
        
        <!-- Biografía -->
        <p>Desarrollador Web Frontend apasionado por el diseño limpio y el código eficiente.</p>
        
        <!-- Lista de Redes Sociales -->
        <ul class="redes-sociales">
            <li><a href="#">Whatsapp</a></li>
            <li><a href="#">LinkedIn</a></li>
            <li><a href="#">GitHub</a></li>
        </ul>
    </div>

</body>
</html>
